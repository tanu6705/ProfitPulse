{% extends "auth_base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="form-container">
        <h2 style="color: #00adb5; text-align: center; margin-bottom: 10px;">Create Account</h2>
        <p style="text-align: center; color: #888; margin-bottom: 25px;">Join the Sales & Profit Analyzer</p>

        <form method="POST">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Choose a unique username" required autofocus>

            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" placeholder="yourname@example.com" required>

            <label for="business_name">Business Name</label>
            <input type="text" name="business_name" id="business_name" placeholder="e.g. My Coffee Shop" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="At least 8 characters" minlength="8" required>

            <button type="submit">Register Now</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #888;">
            Already have an account? 
            <a href="{{ url_for('login') }}" style="color: #00adb5; text-decoration: none; font-weight: bold;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
