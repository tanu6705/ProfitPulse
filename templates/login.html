{% extends "auth_base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="form-container">
        <h2 style="color: #00adb5; text-align: center; margin-bottom: 10px;">Sign In</h2>
        <p style="text-align: center; color: #888; margin-bottom: 25px;">Enter your credentials to access the dashboard</p>

        <form method="POST">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username" required autofocus>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required autocomplete="current-password">

            <button type="submit">Login to Dashboard</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #888;">
            Don't have an account? 
            <a href="{{ url_for('register') }}" style="color: #00adb5; text-decoration: none; font-weight: bold;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
