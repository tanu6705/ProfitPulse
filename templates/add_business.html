{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 50px auto; padding: 30px;">
    <h2 style="color: #00adb5; margin-bottom: 20px;">🆕 Add New Business Profile</h2>
    <form method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #eee;">Business/Shop Name</label>
            <input type="text" name="name" placeholder="e.g. Downtown Branch" required 
                   style="width: 100%; padding: 10px; background: #252525; border: 1px solid #444; color: white;">
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background: #00adb5; border: none; color: white; cursor: pointer;">
            Create Business
        </button>
    </form>
    <div style="margin-top: 20px; text-align: center;">
        <a href="{{ url_for('dashboard') }}" style="color: #888; text-decoration: none;">Cancel</a>
    </div>
</div>
{% endblock %}
